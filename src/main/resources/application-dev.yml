spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/app_starter_dev
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 5
  jpa:
    show-sql: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173

logging:
  level:
    com.starter.app: DEBUG
    org.hibernate.SQL: DEBUG
