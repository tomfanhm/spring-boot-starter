server:
  port: 8080
  servlet:
    context-path: /api
  shutdown: graceful

spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
  lifecycle:
    timeout-per-shutdown-phase: 30s

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 900000
    issuer: spring-boot-starter
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  server:
    port: ${MANAGEMENT_PORT:8081}
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when_authorized
